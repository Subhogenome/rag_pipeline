pdf_dir: "./pdfs"
output_dir: "./output"
log_level: "INFO"

chunking:
  min_tokens: 80            # back to 80 — 100 was filtering too many chunks
  max_tokens: 650
  overlap_tokens: 50        # reduced from 80, not as aggressive as 40
  semantic_split_threshold: 0.35   # back to 0.35 — 0.30 caused too few splits
  include_references: false
  include_captions: true
  include_abstract: true

embedding:
  dims: 256                 # fallback LSA dims (unused if ST loads)
  batch_size: 32
  # Biomedical sentence transformer — better than all-MiniLM for scientific text
  # Understands: gene names, protein complexes, pathways, disease terms
  # Falls back to all-MiniLM-L6-v2 if unavailable
  model_name: "pritamdeka/S-PubMedBert-MS-MARCO"
  fallback_model: "all-MiniLM-L6-v2"

hnsw:
  M: 16
  ef_construction: 200
  ef_search: 80
  space: "cosine"

azure:
  api_version: "2024-05-01-preview"
  tag_max_tokens: 600
  tag_temperature: 0.1
  tag_batch_size: 2
  tag_request_delay: 0.3
  tpm_limit: 6000
  tag_max_retries: 3
  chat_max_tokens: 1500
  chat_temperature: 0.2
  system_prompt: >
    You are a scientific research assistant. Answer questions using ONLY the
    provided context chunks from biomedical papers. Be precise, cite which
    paper each claim comes from, and flag if context is insufficient.

llmlingua:
  enabled: true
  target_token: 400
  rate: 0.4
  rank_method: "order"
  use_llmlingua2: false   # disabled — needs 700MB disk space (only 31MB available)

retrieval:
  score_threshold: 0.50
  min_dip_rate: 0.15
  min_k: 3
  max_k: 15
  hnsw_candidates: 40
  bm25_weight: 0.35
  dense_weight: 0.45
  graph_weight: 0.20
  rrf_k: 60
  graph_walk_depth: 2
  graph_walk_max_nodes: 4
  theme_boost: 1.25
  contradiction_penalty: 0.85

reranker:
  enabled: true
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"  # 80MB, downloads on first query
  batch_size: 32
  ce_weight: 0.70    # 70% cross-encoder + 30% retrieval score

evaluation:
  k_values: [1, 3, 5, 10]
  n_golden_questions: 30
  faithfulness_threshold: 0.7
